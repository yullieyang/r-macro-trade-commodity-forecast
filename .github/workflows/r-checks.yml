name: R checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  parse-and-lint:
    name: Parse + lint R sources
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2'
          use-public-rspm: true

      - name: Restore pinned packages via renv
        uses: r-lib/actions/setup-renv@v2

      - name: Install lintr (not in renv.lock)
        run: Rscript -e 'install.packages("lintr", repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest")'

      - name: Parse every .R file (syntax check)
        run: |
          Rscript -e '
            files <- list.files(c("R", "scripts"),
                                pattern = "[.]R$",
                                recursive = TRUE,
                                full.names = TRUE)
            cat("Parsing", length(files), "R files:\n")
            for (f in files) {
              tryCatch({
                parse(f)
                cat("  OK ", f, "\n")
              }, error = function(e) {
                cat("  FAIL ", f, ":", conditionMessage(e), "\n")
                quit(status = 1)
              })
            }
          '

      - name: Run lintr on R/ and scripts/
        run: |
          Rscript -e '
            lints <- lintr::lint_dir(c("R", "scripts"))
            if (length(lints) > 0L) {
              print(lints)
              cat("\nFound", length(lints), "lint message(s).\n")
            } else {
              cat("No lint messages.\n")
            }
          '

      - name: Run testthat suite
        run: Rscript tests/testthat.R
